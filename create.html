<div id="year_1942" class="scenario_info">
    <p>
        <label><input type="checkbox" value="true" name="historical" id="historical" checked>Use historical japanese
            hand</label>
</div>
<label><input type="checkbox" name="debug" id="debug">Debug mode (additional interactions, you should not check it)</label>
<script>
    let scenario = document.querySelector("select[name='scenario']");
    scenario.onchange = function (evt) {
        document.querySelectorAll(".scenario_info").forEach(e => e.hidden = true);
        // document.getElementById(scenario.value).classList.add("show");
        if (scenario.value.indexOf("1942") >= 0 || scenario.value.indexOf("1941") >= 0) {
            document.querySelector("#year_1942").hidden = false;
        } else {
            document.querySelector("#historical").checked = false
        }
    }
    scenario.onchange();
</script>


<!--
- South Pacific

The scenario focuses on the Allied drives up the Solomon Islands and New Guinea. The game features a damaged but still powerful Imperial Japanese Navy (IJN) poised to slow and potentially stop the Allied advance. The game starts on the eve of Operation Watchtower (Guadalcanal Invasion), so this card begins in the opening Allied hand of cards. The Japanese hand begins with the Savo Island reaction card setting up the potential for the historical opening.

This scenario uses the South Pacific mini-map, is four game turns long (game turns 3, 4, 5, and 6) and begins on game turn 3 at the beginning of the Offensives Phase with the US having the option to use their Future Offensive card to pre-empt the Japanese going first. There is no Reinforcement, Replacement, or Strategic Warfare Segments conducted for game turn 3. Victory is determined by the VP schedule outlined in the rulebook.

For new players to Empire of the Sun, this is the first of three scenarios to play when learning the game. Second would be the 1943 scenario (17.3) and the last is the 1942 Shortened Campaign (17.8).
